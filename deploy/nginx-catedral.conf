# Nginx — proxy reverso para o Catedral ERP (Uvicorn em 127.0.0.1:8000)
# Coloque em /etc/nginx/sites-available/catedral e crie o symlink em sites-enabled.
# Depois rode o certbot para gerar o bloco HTTPS (443) automaticamente.

server {
    listen 80;
    listen [::]:80;
    server_name SEU_DOMINIO.com www.SEU_DOMINIO.com;

    # Uploads de planilhas (.xlsx/.csv) na importacao Shopee
    client_max_body_size 25M;

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }
}
